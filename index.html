<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPI Curug – Data Tenaga Pendidik & Kependidikan</title>
  <style>
    /* ── (all your existing CSS – keep unchanged) ── */
    /* (I'm omitting the full CSS for brevity, but keep the exact same CSS you have) */

    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4f9;color:#1a2a3a;padding:32px 20px;line-height:1.6}
    .container{max-width:880px;margin:0 auto;background:white;border-radius:32px;box-shadow:0 20px 60px rgba(0,20,40,0.10);padding:44px 52px}
    /* ... (keep all existing styles) ... */
  </style>
</head>
<body>
  <!-- same HTML structure as before – keep unchanged -->
  <div class="container" id="app">
    <!-- ... all the form fields ... -->
  </div>

  <script>
    // ============================================================
    //  CONFIGURATION
    // ============================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbwlXJYX7NTl4dZfyqQCWPxOP-esIV9dyExQYyrJuOX58Em2JZkPq2BB5n2HAkRpnBSe/exec';
    const USE_MOCK = false;

    // ============================================================
    //  STATE
    // ============================================================
    let allData = [];
    let selectedFile = null;
    let croppedFileData = null;
    let uploadedFileUrl = '';

    const tags = { edu: [], cert: [], course: [], expertise: [] };

    // ============================================================
    //  DOM REFS (same as before)
    // ============================================================
    const $ = id => document.getElementById(id);
    // ... all your $ refs ...

    // ============================================================
    //  TAG SYSTEM (same as before)
    // ============================================================
    // ... keep all your tag functions ...

    // ============================================================
    //  PHOTO UPLOAD (same as before)
    // ============================================================
    // ... keep handleFile, removeFile ...

    // ============================================================
    //  GET DATA FROM FORM (same)
    // ============================================================
    function getFormData() {
      // ... same as before ...
    }

    // ============================================================
    //  SUBMIT – FIXED: uses URL-encoded POST (no preflight)
    // ============================================================
    async function submitForm(e) {
      e.preventDefault();
      const data = getFormData();
      if (!data) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Menyimpan...';

      try {
        let photoUrl = uploadedFileUrl;

        // 1. Upload photo if new (using FormData – no preflight)
        if (croppedFileData && !uploadedFileUrl) {
          if (USE_MOCK) {
            await new Promise(r => setTimeout(r, 600));
            photoUrl = 'https://picsum.photos/seed/' + Date.now() + '/200/200';
          } else {
            // Convert base64 to Blob
            const blob = await fetch(croppedFileData).then(r => r.blob());
            const formData = new FormData();
            formData.append('file', blob, 'foto.jpg');
            formData.append('name', data.name);

            const uploadResp = await fetch(API_URL + '?action=upload', {
              method: 'POST',
              body: formData  // multipart/form-data – no preflight
            });
            const uploadResult = await uploadResp.json();
            if (uploadResult.success) {
              photoUrl = uploadResult.url;
              uploadedFileUrl = photoUrl;
            } else {
              throw new Error(uploadResult.message || 'Gagal upload foto.');
            }
          }
        }

        data.photo = photoUrl;

        // 2. Save main data – using URL-encoded POST (no preflight)
        if (USE_MOCK) {
          await new Promise(r => setTimeout(r, 500));
          const mockId = Date.now();
          allData.push({ id: mockId, ...data });
          renderTable();
          showNotif('success', 'Data berhasil disimpan (mock mode).');
          resetForm();
        } else {
          // Convert data to URLSearchParams
          const params = new URLSearchParams();
          params.append('action', 'save');
          params.append('name', data.name);
          params.append('type', data.type);
          params.append('prodi', data.prodi);
          params.append('jabatan', data.jabatan);
          params.append('instansi', data.instansi);
          params.append('bio', data.bio);
          params.append('pendidikan', JSON.stringify(data.pendidikan));
          params.append('sertifikat', JSON.stringify(data.sertifikat));
          params.append('mataKuliah', JSON.stringify(data.mataKuliah));
          params.append('kepakaran', JSON.stringify(data.kepakaran));
          params.append('photo', data.photo);

          const saveResp = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params.toString()
          });
          const saveResult = await saveResp.json();
          if (saveResult.success) {
            showNotif('success', 'Data berhasil disimpan!');
            resetForm();
            loadData();
          } else {
            throw new Error(saveResult.message || 'Gagal menyimpan data.');
          }
        }

      } catch (err) {
        showNotif('error', 'Terjadi kesalahan: ' + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-save"></i> Simpan Data';
      }
    }

    // ============================================================
    //  LOAD DATA – unchanged (simple GET)
    // ============================================================
    async function loadData() {
      try {
        if (USE_MOCK) { renderTable(); buildRefListsFromData(); return; }
        const resp = await fetch(API_URL + '?action=list');
        const result = await resp.json();
        if (result.success) {
          allData = result.data || [];
          renderTable();
          buildRefListsFromData();
        } else {
          showNotif('error', 'Gagal memuat data: ' + (result.message || ''));
        }
      } catch (err) {
        showNotif('error', 'Gagal memuat data: ' + err.message);
      }
    }

    // ============================================================
    //  DELETE – unchanged (GET with id)
    // ============================================================
    async function deleteRow(idx) {
      const row = allData[idx];
      if (!row) return;
      if (!confirm(`Hapus data "${row.name}"?`)) return;
      if (USE_MOCK) {
        allData.splice(idx, 1);
        renderTable();
        buildRefListsFromData();
        showNotif('success', 'Data dihapus (mock mode).');
        return;
      }
      try {
        submitBtn.disabled = true;
        const resp = await fetch(API_URL + '?action=delete&id=' + encodeURIComponent(row.id || ''));
        const result = await resp.json();
        if (result.success) {
          allData.splice(idx, 1);
          renderTable();
          buildRefListsFromData();
          showNotif('success', 'Data berhasil dihapus.');
        } else {
          throw new Error(result.message || 'Gagal hapus data.');
        }
      } catch (err) {
        showNotif('error', 'Gagal hapus: ' + err.message);
      } finally {
        submitBtn.disabled = false;
      }
    }

    // ============================================================
    //  RENDER TABLE, REF LISTS, ETC – unchanged
    // ============================================================
    // ... keep all other functions (renderTable, buildRefListsFromData, viewRow, etc.)

    // ============================================================
    //  INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
      if (!USE_MOCK) loadData();
      // ... rest
    });

    // ============================================================
    //  GLOBAL EXPOSURE
    // ============================================================
    window.addTag = addTag;
    window.removeTag = removeTag;
    window.addTagFromRef = addTagFromRef;
    window.handleFile = handleFile;
    window.removeFile = removeFile;
    window.submitForm = submitForm;
    window.loadData = loadData;
    window.viewRow = viewRow;
    window.deleteRow = deleteRow;
    window.resetForm = resetForm;
    window.closeNotif = closeNotif;
    window.showNotif = showNotif;
  </script>
</body>
</html>
